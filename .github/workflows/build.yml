name: Build
'on':
  push:
    branches:
      - main

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm install --save-dev electron-builder@24.13.3
      - run: npm run build:mac
      - uses: actions/upload-artifact@v4
        with:
          name: mac-dmg
          path: dist/*.dmg

  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm install --save-dev electron-builder@24.13.3
      - run: npm run build:win
      - uses: actions/upload-artifact@v4
        with:
          name: win-exe
          path: dist/*.exe